<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower FaceID v1.1</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        video { border: 3px solid #007bff; border-radius: 15px; width: 100%; max-width: 400px; background: #000; transform: scaleX(-1); }
        .controls { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        input, button { padding: 15px; border-radius: 8px; width: 85%; max-width: 320px; font-size: 16px; border: none; }
        .btn-cadastrar { background: #28a745; color: white; font-weight: bold; cursor: pointer; }
        .btn-reconhecer { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; opacity: 0.6; }
        #status { margin-top: 15px; color: #ffc107; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>
    <h2>Tower FaceID - Cloud Sync</h2>
    <video id="video" autoplay muted playsinline></video>
    
    <div class="controls">
        <input type="text" id="nomeUsuario" placeholder="Nome para cadastro">
        <button id="btnCad" class="btn-cadastrar" onclick="cadastrar()" disabled>Cadastrar Rosto v1.1</button>
        <button id="btnRec" class="btn-reconhecer" onclick="reconhecer()" disabled>Quem é você?</button>
    </div>
    <p id="status">Iniciando sistema...</p>

    <script>
        const BIN_ID = "69acff2dae596e708f6baabd"; //
        const API_KEY = "SUA_API_KEY_AQUI"; // Certifique-se de usar sua Master Key
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        async function iniciar() {
            const video = document.getElementById('video');
            const status = document.getElementById('status');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
            } catch (err) { status.innerText = "Erro: Câmera não permitida."; return; }

            const MODEL_URL = 'https://raw.githubusercontent.com/vladmandic/face-api/master/model';
            try {
                status.innerText = "Carregando IA...";
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                status.innerText = "Sistema Pronto";
                document.getElementById('btnCad').disabled = false;
                document.getElementById('btnRec').disabled = false;
            } catch (e) { status.innerText = "Erro ao carregar modelos."; }
        }

        async function obterBanco() {
            try {
                const res = await fetch(URL, { headers: { "X-Master-Key": API_KEY } });
                const data = await res.json();
                console.log("Resposta do Banco:", data);
                // Tratamento seguro da estrutura do JSONBin
                if (data.record && data.record.users) return data.record.users;
                if (Array.isArray(data.record)) return data.record;
                return [];
            } catch (e) { console.error("Erro fetch:", e); return []; }
        }

        async function cadastrar() {
            const nome = document.getElementById('nomeUsuario').value;
            if (!nome) return alert("Digite um nome!");
            
            document.getElementById('status').innerText = "Analisando rosto...";
            const detec = await faceapi.detectSingleFace('video', new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if (!detec) return alert("Rosto não detectado!");

            let lista = await obterBanco();

            // Lógica de Antiduplicação (Essencial para Cloud)
            if (lista.length > 0) {
                const labeled = lista.map(u => new faceapi.LabeledFaceDescriptors(u.nome, [new Float32Array(u.descriptor)]));
                const matcher = new faceapi.FaceMatcher(labeled, 0.5);
                const match = matcher.findBestMatch(detec.descriptor);
                if (match.label !== 'unknown') return alert(`Atenção: Já cadastrado como ${match.label}`);
            }

            lista.push({ nome, descriptor: Array.from(detec.descriptor) });
            await fetch(URL, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify({ users: lista })
            });
            alert("Sucesso!");
            document.getElementById('status').innerText = "Pronto";
        }

        async function reconhecer() {
            const status = document.getElementById('status');
            status.innerText = "Identificando...";
            
            try {
                const detec = await faceapi.detectSingleFace('video', new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                if (!detec) return alert("Aponte a câmera para o seu rosto.");

                const lista = await obterBanco();
                if (lista.length === 0) return alert("Banco de dados vazio.");

                // CORREÇÃO CRUCIAL: Reidratação de dados para Float32Array
                const labeledDescriptors = lista.map(u => {
                    const desc = new Float32Array(u.descriptor);
                    return new faceapi.LabeledFaceDescriptors(u.nome, [desc]);
                });

                const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
                const match = faceMatcher.findBestMatch(detec.descriptor);

                if (match.label === 'unknown') {
                    alert("Usuário não reconhecido.");
                } else {
                    alert("Olá, " + match.label + "!");
                }
            } catch (err) {
                console.error(err);
                alert("Erro técnico: " + err.message);
            }
            status.innerText = "Pronto";
        }

        iniciar();
    </script>
</body>
</html>
