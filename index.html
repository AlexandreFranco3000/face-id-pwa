<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower FaceID v1.0</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        video { border: 3px solid #007bff; border-radius: 15px; width: 100%; max-width: 400px; background: #000; transform: scaleX(-1); }
        .controls { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        input, button { padding: 15px; border-radius: 8px; width: 85%; max-width: 320px; font-size: 16px; border: none; }
        input { background: #fff; color: #000; }
        .btn-cadastrar { background: #28a745; color: white; font-weight: bold; cursor: pointer; }
        .btn-reconhecer { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }
        #status { margin-top: 15px; color: #ffc107; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Tower FaceID - Cloud Sync</h2>
    <video id="video" autoplay muted playsinline></video>
    
    <div class="controls">
        <input type="text" id="nomeUsuario" placeholder="Digite o nome para salvar">
        <button id="btnCad" class="btn-cadastrar" onclick="cadastrar()" disabled>Cadastrar Rosto v1.0</button>
        <button id="btnRec" class="btn-reconhecer" onclick="reconhecer()" disabled>Quem é você?</button>
    </div>
    <p id="status">Iniciando câmera e carregando IA...</p>

    <script>
        const BIN_ID = "69acff2dae596e708f6baabd"; //
        const API_KEY = "SUA_API_KEY_AQUI"; // Substitua pela sua Master Key do JSONBin
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        async function iniciar() {
            const video = document.getElementById('video');
            const status = document.getElementById('status');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 480 } 
                });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "ERRO: Câmera bloqueada ou sem HTTPS.";
                return;
            }

            // Endereço confiável para os modelos
            const MODEL_URL = 'https://raw.githubusercontent.com/vladmandic/face-api/master/model';
            
            try {
                status.innerText = "Carregando Redes Neurais...";
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                
                status.innerText = "Sistema Pronto - IA Online";
                document.getElementById('btnCad').disabled = false;
                document.getElementById('btnRec').disabled = false;
            } catch (e) {
                status.innerText = "ERRO ao baixar modelos da nuvem.";
            }
        }

        async function capturarDnaFacial() {
            // Opções otimizadas para detecção mobile
            const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 });
            const detec = await faceapi.detectSingleFace('video', options)
                                       .withFaceLandmarks()
                                       .withFaceDescriptor();
            return detec;
        }

        async function cadastrar() {
            const nome = document.getElementById('nomeUsuario').value;
            const status = document.getElementById('status');
            if (!nome) return alert("Por favor, digite um nome.");

            status.innerText = "Buscando rosto... Mantenha-se parado.";
            const detec = await capturarDnaFacial();

            if (!detec) {
                status.innerText = "Falha: Rosto não detectado.";
                return alert("A IA não encontrou um rosto. Verifique a iluminação e centralize o rosto na câmera.");
            }

            try {
                status.innerText = "Acessando Banco Cloud...";
                const res = await fetch(URL, { headers: { "X-Master-Key": API_KEY } });
                const base = await res.json();
                let lista = (base.record && base.record.users) ? base.record.users : [];

                // Lógica de Deduplicação com Reidratação de Dados
                if (lista.length > 0) {
                    const labeled = lista.map(u => new faceapi.LabeledFaceDescriptors(u.nome, [new Float32Array(u.descriptor)]));
                    const matcher = new faceapi.FaceMatcher(labeled, 0.5);
                    const match = matcher.findBestMatch(detec.descriptor);
                    
                    if (match.label !== 'unknown') {
                        status.innerText = "Aviso: Já cadastrado.";
                        return alert(`Este rosto já pertence a: ${match.label}`);
                    }
                }

                status.innerText = "Salvando na Nuvem...";
                lista.push({ nome, descriptor: Array.from(detec.descriptor) });

                await fetch(URL, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                    body: JSON.stringify({ users: lista })
                });

                alert(`${nome} cadastrado com sucesso!`);
                status.innerText = "Pronto";
            } catch (e) {
                status.innerText = "Erro na conexão Cloud.";
                alert("Erro ao salvar: " + e);
            }
        }

        async function reconhecer() {
            const status = document.getElementById('status');
            status.innerText = "Analisando biometria...";
            
            const detec = await capturarDnaFacial();
            if (!detec) return alert("Rosto não detectado.");

            try {
                const res = await fetch(URL, { headers: { "X-Master-Key": API_KEY } });
                const base = await res.json();
                const lista = (base.record && base.record.users) ? base.record.users : [];

                if (lista.length === 0) return alert("Ninguém cadastrado no banco.");

                const labeled = lista.map(u => new faceapi.LabeledFaceDescriptors(u.nome, [new Float32Array(u.descriptor)]));
                const matcher = new faceapi.FaceMatcher(labeled, 0.6);
                const match = matcher.findBestMatch(detec.descriptor);

                alert("Resultado: " + match.toString());
                status.innerText = "Pronto";
            } catch (e) {
                alert("Erro ao identificar: " + e);
            }
        }

        iniciar();
    </script>
</body>
</html>
