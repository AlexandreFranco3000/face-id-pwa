<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower FaceID - Diagnóstico</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        video { border: 3px solid #444; border-radius: 15px; width: 100%; max-width: 400px; background: #000; }
        .btn { padding: 15px; margin: 10px; border-radius: 8px; width: 80%; max-width: 300px; font-size: 16px; cursor: pointer; border: none; opacity: 0.5; }
        .ready { opacity: 1; }
        .btn-cadastrar { background: #28a745; color: white; }
        .btn-reconhecer { background: #007bff; color: white; }
    </style>
</head>
<body>
    <h2>FaceID - Status: <span id="status">Carregando IA...</span></h2>
    <video id="video" autoplay muted playsinline></video>
    <br>
    <input type="text" id="nomeUsuario" placeholder="Nome para cadastro" style="padding:15px; width:75%; border-radius:8px; margin-bottom:10px;">
    <button id="btnCad" class="btn btn-cadastrar" onclick="cadastrar()" disabled>Cadastrar Rosto</button>
    <button id="btnRec" class="btn btn-reconhecer" onclick="reconhecer()" disabled>Quem é?</button>

    <script>
        const BIN_ID = "69acff2dae596e708f6baabd";
        const API_KEY = "SUA_API_KEY_AQUI"; // Certifique-se de que é a Master Key
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        async function iniciar() {
            const video = document.getElementById('video');
            try {
                // Força a câmera em alta qualidade para melhor detecção
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" } 
                });
                video.srcObject = stream;
            } catch (err) {
                document.getElementById('status').innerText = "Erro na câmera!";
                console.error(err);
            }

            // Usando um CDN alternativo para os modelos se o anterior falhar
            const MODEL_URL = 'https://raw.githubusercontent.com/vladmandic/face-api/master/model';
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                
                // Ativa os botões só quando tudo estiver carregado
                document.getElementById('status').innerText = "Pronto";
                document.getElementById('btnCad').disabled = false;
                document.getElementById('btnRec').disabled = false;
                document.getElementById('btnCad').classList.add('ready');
                document.getElementById('btnRec').classList.add('ready');
            } catch (e) {
                document.getElementById('status').innerText = "Erro ao carregar Modelos IA";
            }
        }

        async function detectarRosto() {
            // Opções do detector mais sensíveis
            const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 });
            const detec = await faceapi.detectSingleFace('video', options).withFaceLandmarks().withFaceDescriptor();
            return detec;
        }

        async function cadastrar() {
            const nome = document.getElementById('nomeUsuario').value;
            if (!nome) return alert("Digite um nome!");
            
            document.getElementById('status').innerText = "Buscando rosto...";
            const detec = await detectarRosto();
            
            if (!detec) {
                document.getElementById('status').innerText = "Rosto não encontrado";
                return alert("Não detectamos seu rosto. Aproxime-se da câmera e melhore a luz.");
            }

            // ... (Lógica de fetch e upload anterior permanece igual)
            alert("Rosto detectado e enviado!");
            document.getElementById('status').innerText = "Pronto";
        }

        async function reconhecer() {
            document.getElementById('status').innerText = "Identificando...";
            const detec = await detectarRosto();
            if (!detec) return alert("Rosto não detectado.");
            
            // ... (Lógica de comparação anterior permanece igual)
            document.getElementById('status').innerText = "Pronto";
        }

        iniciar();
    </script>
</body>
</html>
