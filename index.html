<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower FaceID v1.2</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #121212; color: white; padding: 20px; margin: 0; }
        video { border: 3px solid #007bff; border-radius: 15px; width: 100%; max-width: 400px; background: #000; transform: scaleX(-1); margin-bottom: 10px; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        input, button { padding: 15px; border-radius: 8px; width: 85%; max-width: 320px; font-size: 16px; border: none; outline: none; }
        input { background: #fff; color: #000; }
        .btn-cadastrar { background: #28a745; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-reconhecer { background: #007bff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #444; opacity: 0.6; cursor: not-allowed; }
        #status { margin-top: 15px; color: #ffc107; font-weight: bold; min-height: 20px; }
        .version { font-size: 12px; color: #555; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Tower FaceID - Cloud Sync</h2>
    <video id="video" autoplay muted playsinline></video>
    
    <div class="container">
        <input type="text" id="nomeUsuario" placeholder="Nome para cadastro">
        <button id="btnCad" class="btn-cadastrar" onclick="cadastrar()" disabled>Cadastrar Rosto v1.2</button>
        <button id="btnRec" class="btn-reconhecer" onclick="reconhecer()" disabled>Quem é você?</button>
    </div>
    
    <p id="status">Iniciando câmera e carregando IA...</p>
    <div class="version">Build: 2026.03.08 - v1.2</div>

    <script>
        // Configurações do Banco Centralizado (JSONBin)
        const BIN_ID = "69acff2dae596e708f6baabd"; 
        const API_KEY = "SUA_API_KEY_AQUI"; // <--- COLOQUE SUA MASTER KEY AQUI
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        // 1. Inicializa Câmera e Modelos de IA
        async function iniciar() {
            const video = document.getElementById('video');
            const status = document.getElementById('status');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 480 } 
                });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "ERRO: Câmera bloqueada ou sem HTTPS.";
                return;
            }

            const MODEL_URL = 'https://raw.githubusercontent.com/vladmandic/face-api/master/model';
            try {
                status.innerText = "Carregando Redes Neurais...";
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                status.innerText = "Sistema Pronto";
                document.getElementById('btnCad').disabled = false;
                document.getElementById('btnRec').disabled = false;
            } catch (e) {
                status.innerText = "ERRO ao baixar modelos da nuvem.";
            }
        }

        // 2. Função Auxiliar para obter dados do Banco Cloud
        async function obterBanco() {
            try {
                const res = await fetch(URL, { headers: { "X-Master-Key": API_KEY } });
                const data = await res.json();
                
                // Validação de estrutura: JSONBin coloca os dados em 'record'
                if (data.record && data.record.users) return data.record.users;
                if (data.record && Array.isArray(data.record)) return data.record;
                if (Array.isArray(data)) return data;
                
                return [];
            } catch (e) {
                console.error("Erro na comunicação Cloud:", e);
                return [];
            }
        }

        // 3. Função de Cadastro (Com Antiduplicação)
        async function cadastrar() {
            const nome = document.getElementById('nomeUsuario').value;
            const status = document.getElementById('status');
            if (!nome) return alert("Por favor, digite um nome!");

            status.innerText = "Analisando face...";
            const detec = await faceapi.detectSingleFace('video', new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if (!detec) {
                status.innerText = "Rosto não detectado.";
                return alert("Aproxime-se da câmera e melhore a iluminação.");
            }

            try {
                status.innerText = "Verificando duplicados...";
                let lista = await obterBanco();

                if (lista.length > 0) {
                    const labeled = lista.map(u => new faceapi.LabeledFaceDescriptors(u.nome, [new Float32Array(u.descriptor)]));
                    const matcher = new faceapi.FaceMatcher(labeled, 0.5);
                    const match = matcher.findBestMatch(detec.descriptor);
                    
                    if (match.label !== 'unknown') {
                        status.innerText = "Aviso: Já cadastrado.";
                        return alert(`Este rosto já pertence a: ${match.label}`);
                    }
                }

                status.innerText = "Salvando na Nuvem...";
                lista.push({ nome, descriptor: Array.from(detec.descriptor) });

                await fetch(URL, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                    body: JSON.stringify({ users: lista })
                });

                alert(`${nome} cadastrado com sucesso!`);
                status.innerText = "Pronto";
                document.getElementById('nomeUsuario').value = "";
            } catch (e) {
                status.innerText = "Erro na conexão Cloud.";
                alert("Erro ao salvar: " + e);
            }
        }

        // 4. Função de Reconhecimento (Quem é você?)
        async function reconhecer() {
            const status = document.getElementById('status');
            status.innerText = "Identificando biometria...";
            
            try {
                const detec = await faceapi.detectSingleFace('video', new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                if (!detec) return alert("Rosto não detectado.");

                const lista = await obterBanco();
                if (lista.length === 0) return alert("O banco central está vazio.");

                // Converte descriptors salvos (Arrays) de volta para Float32Array
                const labeledDescriptors = lista.map(u => {
                    const desc = new Float32Array(u.descriptor);
                    return new faceapi.LabeledFaceDescriptors(u.nome, [desc]);
                });

                const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
                const match = faceMatcher.findBestMatch(detec.descriptor);

                if (match.label === 'unknown') {
                    alert("Não te reconheci. Tente cadastrar seu rosto primeiro.");
                } else {
                    alert("Reconhecido: " + match.label);
                }
                status.innerText = "Pronto";
            } catch (err) {
                console.error(err);
                alert("Erro técnico: " + err.message);
                status.innerText = "Erro no processo.";
            }
        }

        // Inicia o sistema ao carregar a página
        iniciar();
    </script>
</body>
</html>
