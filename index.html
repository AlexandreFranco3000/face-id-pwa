<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <title>Tower FaceID v1.8</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 20px; margin: 0; }
        video { border: 3px solid #28a745; border-radius: 15px; width: 100%; max-width: 400px; background: #000; transform: scaleX(-1); }
        .container { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 15px; }
        input, button { padding: 15px; border-radius: 8px; width: 85%; max-width: 320px; font-size: 16px; border: none; }
        .btn-cadastrar { background: #28a745; color: white; font-weight: bold; cursor: pointer; }
        .btn-reconhecer { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; opacity: 0.6; }
        #status { margin-top: 15px; color: #ffc107; font-weight: bold; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>
    <h2>Tower FaceID - v1.8</h2>
    <video id="video" autoplay muted playsinline></video>
    
    <div class="container">
        <input type="text" id="nomeUsuario" placeholder="Nome para cadastro">
        <button id="btnCad" class="btn-cadastrar" onclick="cadastrar()" disabled>Cadastrar Rosto v1.8</button>
        <button id="btnRec" class="btn-reconhecer" onclick="reconhecer()" disabled>Quem é você?</button>
    </div>
    
    <p id="status">Sincronizando...</p>

    <script>
        const BIN_ID = "69acff2dae596e708f6baabd"; 
        const API_KEY = "$2a$10$PzIq1jVCP059YSkMru60EuiSYQ94hpypE7Itt2gk4RGxCs8siPZUm"; 
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        async function iniciar() {
            const status = document.getElementById('status');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
                
                const MODEL_URL = 'https://raw.githubusercontent.com/vladmandic/face-api/master/model';
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                
                const res = await fetch(URL, { headers: { "X-Master-Key": API_KEY } });
                if (res.ok) {
                    status.innerText = "Sistema Online - v1.8";
                    document.getElementById('btnCad').disabled = false;
                    document.getElementById('btnRec').disabled = false;
                }
            } catch (e) { status.innerText = "Erro de inicialização."; }
        }

        async function obterLista() {
            const res = await fetch(URL, { headers: { "X-Master-Key": API_KEY, "Cache-Control": "no-cache" } });
            const data = await res.json();
            return data.record.users || [];
        }

        async function cadastrar() {
            const nome = document.getElementById('nomeUsuario').value;
            if (!nome) return alert("Digite um nome!");
            
            const status = document.getElementById('status');
            status.innerText = "Validando duplicidade...";
            
            const detec = await faceapi.detectSingleFace('video', new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if (!detec) return alert("Rosto não detectado.");

            try {
                let lista = await obterLista();

                // LÓGICA ANTI-DUPLICIDADE RIGOROSA
                if (lista.length > 0) {
                    const labeled = lista.map(u => new faceapi.LabeledFaceDescriptors(u.nome, [new Float32Array(u.descriptor)]));
                    // Limiar de 0.5 (se a distância for menor que isso, é a mesma pessoa)
                    const matcher = new faceapi.FaceMatcher(labeled, 0.5); 
                    const match = matcher.findBestMatch(detec.descriptor);

                    if (match.label !== 'unknown') {
                        status.innerText = "Erro: Usuário já cadastrado.";
                        return alert(`Atenção! Este rosto já está cadastrado como: ${match.label}`);
                    }
                }

                status.innerText = "Salvando novo registro...";
                lista.push({ nome, descriptor: Array.from(detec.descriptor) });

                await fetch(URL, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                    body: JSON.stringify({ users: lista })
                });

                alert(`Sucesso! ${nome} cadastrado.`);
                document.getElementById('nomeUsuario').value = "";
                status.innerText = "Pronto";
            } catch (e) { 
                alert("Erro ao salvar."); 
                status.innerText = "Erro de rede.";
            }
        }

        async function reconhecer() {
            const detec = await faceapi.detectSingleFace('video', new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if (!detec) return alert("Rosto não detectado.");

            try {
                const lista = await obterLista();
                if (lista.length === 0) return alert("Banco vazio.");

                const labeled = lista.map(u => new faceapi.LabeledFaceDescriptors(u.nome, [new Float32Array(u.descriptor)]));
                const matcher = new faceapi.FaceMatcher(labeled, 0.6);
                const match = matcher.findBestMatch(detec.descriptor);

                alert(match.label === 'unknown' ? "Não reconhecido." : "Identificado: " + match.label);
            } catch (e) { alert("Erro na identificação."); }
        }

        iniciar();
    </script>
</body>
</html>
