<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower FaceID v1.5</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        video { border: 3px solid #007bff; border-radius: 15px; width: 100%; max-width: 400px; background: #000; transform: scaleX(-1); }
        .container { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 15px; }
        input, button { padding: 15px; border-radius: 8px; width: 85%; max-width: 320px; font-size: 16px; border: none; }
        .btn-cadastrar { background: #28a745; color: white; font-weight: bold; }
        .btn-reconhecer { background: #007bff; color: white; font-weight: bold; }
        button:disabled { background: #444; opacity: 0.6; }
        #status { margin-top: 15px; color: #ffc107; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <h2>Tower FaceID - v1.5</h2>
    <video id="video" autoplay muted playsinline></video>
    
    <div class="container">
        <input type="text" id="nomeUsuario" placeholder="Nome para cadastro">
        <button id="btnCad" class="btn-cadastrar" onclick="cadastrar()" disabled>Cadastrar Rosto v1.5</button>
        <button id="btnRec" class="btn-reconhecer" onclick="reconhecer()" disabled>Quem é você?</button>
    </div>
    
    <p id="status">Verificando Hardware...</p>

    <script>
        const BIN_ID = "69acff2dae596e708f6baabd"; 
        const API_KEY = "SUA_API_KEY_AQUI"; 
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        async function iniciar() {
            const status = document.getElementById('status');
            
            // 1. Teste de Câmera
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
            } catch (e) {
                status.innerText = "ERRO: Sem acesso à câmera (Use HTTPS).";
                return;
            }

            // 2. Carregamento de Modelos com Fallback
            try {
                status.innerText = "Sincronizando IA (Aguarde)...";
                const MODEL_URL = 'https://raw.githubusercontent.com/vladmandic/face-api/master/model';
                
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                status.innerText = "IA Pronta. Validando Cloud...";
            } catch (e) {
                status.innerText = "ERRO: Falha ao baixar modelos de IA.";
                return;
            }

            // 3. Teste de API Cloud
            try {
                const res = await fetch(URL, { headers: { "X-Master-Key": API_KEY } });
                if (res.ok) {
                    status.innerText = "Sistema Online - v1.5";
                    document.getElementById('btnCad').disabled = false;
                    document.getElementById('btnRec').disabled = false;
                } else {
                    status.innerText = `ERRO Cloud: ${res.status}`;
                }
            } catch (e) {
                status.innerText = "ERRO: Bloqueio de Rede/DNS na Cloud.";
            }
        }

        async function cadastrar() {
            const nome = document.getElementById('nomeUsuario').value;
            if (!nome) return alert("Digite um nome!");
            
            document.getElementById('status').innerText = "Processando face...";
            const detec = await faceapi.detectSingleFace('video', new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if (!detec) return alert("Não detectado. Aproxime o rosto.");

            try {
                const res = await fetch(URL, { headers: { "X-Master-Key": API_KEY } });
                const data = await res.json();
                let lista = data.record.users || [];

                lista.push({ nome, descriptor: Array.from(detec.descriptor) });

                await fetch(URL, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                    body: JSON.stringify({ users: lista })
                });
                alert("Cadastrado!");
                document.getElementById('status').innerText = "Pronto";
            } catch (e) { alert("Erro no envio."); }
        }

        async function reconhecer() {
            const detec = await faceapi.detectSingleFace('video', new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if (!detec) return alert("Rosto não detectado.");

            try {
                const res = await fetch(URL, { headers: { "X-Master-Key": API_KEY } });
                const data = await res.json();
                const lista = data.record.users || [];

                const labeled = lista.map(u => new faceapi.LabeledFaceDescriptors(u.nome, [new Float32Array(u.descriptor)]));
                const matcher = new faceapi.FaceMatcher(labeled, 0.6);
                const match = matcher.findBestMatch(detec.descriptor);

                alert("Resultado: " + match.toString());
            } catch (e) { alert("Erro ao identificar."); }
        }

        iniciar();
    </script>
</body>
</html>
