<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower FaceID - Cloud Sync</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        video { border: 4px solid #333; border-radius: 15px; width: 100%; max-width: 400px; background: #000; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        input { padding: 12px; border-radius: 8px; border: none; width: 80%; max-width: 300px; }
        button { padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 80%; max-width: 300px; transition: 0.3s; }
        .btn-cadastrar { background: #28a745; color: white; }
        .btn-reconhecer { background: #007bff; color: white; }
        #status { margin-top: 15px; color: #aaa; }
    </style>
</head>
<body>
    <h2>Reconhecimento Facial Centralizado</h2>
    <video id="video" autoplay muted playsinline></video>
    
    <div class="controls">
        <input type="text" id="nomeUsuario" placeholder="Nome para cadastro">
        <button class="btn-cadastrar" onclick="cadastrar()">Cadastrar no Banco Cloud</button>
        <button class="btn-reconhecer" onclick="reconhecer()">Identificar Pessoa</button>
    </div>
    <p id="status">Iniciando câmera e modelos...</p>

    <script>
        const BIN_ID = "69acff2dae596e708f6baabd"; 
        const API_KEY = "$2a$10$PzIq1jVCP059YSkMru60EuiSYQ94hpypE7Itt2gk4RGxCs8siPZUm"; // <--- COLOQUE SUA CHAVE DO JSONBIN AQUI
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        async function iniciar() {
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
            } catch (err) { 
                document.getElementById('status').innerText = "Erro ao acessar câmera. Use HTTPS.";
                return;
            }

            const MODEL_URL = 'https://raw.githubusercontent.com/vladmandic/face-api/master/model';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            document.getElementById('status').innerText = "Sistema Online e Sincronizado";
        }

async function cadastrar() {
    const nome = document.getElementById('nomeUsuario').value;
    if (!nome) return alert("Digite um nome!");
    
    document.getElementById('status').innerText = "Analisando rosto...";
    const detec = await faceapi.detectSingleFace('video', new faceapi.TinyFaceDetectorOptions())
                               .withFaceLandmarks()
                               .withFaceDescriptor();
    
    if (!detec) return alert("Rosto não detectado!");

    try {
        // 1. Baixa a lista atual do banco central
        const res = await fetch(URL, { headers: { "X-Master-Key": API_KEY } });
        const base = await res.json();
        let lista = (base.record && base.record.users) ? base.record.users : [];

        // 2. LÓGICA DE DEDUPLICAÇÃO:
        // Verifica se o rosto atual já é muito parecido com algum rosto na lista
        if (lista.length > 0) {
            const labeledDescriptors = lista.map(u => 
                new faceapi.LabeledFaceDescriptors(u.nome, [new Float32Array(u.descriptor)])
            );
            const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6); // 0.6 é o limite de similaridade
            const match = faceMatcher.findBestMatch(detec.descriptor);

            // Se o sistema encontrar um rosto com distância menor que o threshold, bloqueia o cadastro
            if (match.label !== 'unknown') {
                return alert(`Este rosto já está cadastrado como: ${match.label}`);
            }
        }

        // 3. Se passou pela verificação, adiciona o novo vetor
        lista.push({ nome, descriptor: Array.from(detec.descriptor) });

        // 4. Salva de volta no banco
        await fetch(URL, {
            method: 'PUT',
            headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
            body: JSON.stringify({ users: lista })
        });
        
        alert(`Sucesso! ${nome} foi salvo no banco central.`);
    } catch (e) { 
        alert("Erro na nuvem: " + e); 
    }
    document.getElementById('status').innerText = "Pronto";
}
        async function reconhecer() {
            document.getElementById('status').innerText = "Capturando imagem...";
            const detecAtual = await faceapi.detectSingleFace('video', new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if (!detecAtual) return alert("Nenhum rosto à frente da câmera.");

            document.getElementById('status').innerText = "Consultando banco central...";
            try {
                const res = await fetch(URL, { headers: { "X-Master-Key": API_KEY } });
                const base = await res.json();
                const lista = base.record.users;

                if (!lista || lista.length === 0) return alert("Banco de dados vazio!");

                const labeledDescriptors = lista.map(u => new faceapi.LabeledFaceDescriptors(u.nome, [new Float32Array(u.descriptor)]));
                const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
                const match = faceMatcher.findBestMatch(detecAtual.descriptor);

                alert("Resultado: " + match.toString());
            } catch (e) { alert("Erro de conexão: " + e); }
            document.getElementById('status').innerText = "Pronto";
        }

        iniciar();
    </script>
</body>
</html>
